<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RYSE Daily Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f0f;
    color: #e8e4dc;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 32px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .card {
    background: #161616;
    border: 1px solid #2a2a2a;
    border-radius: 16px;
    padding: 32px;
    max-width: 540px;
    width: 100%;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid #222;
  }
  .header-icon { font-size: 18px; }
  .header-title {
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .header-date {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: #555;
    margin-left: auto;
  }
  .event {
    padding: 16px 0;
    border-bottom: 1px solid #1e1e1e;
  }
  .event:last-child { border-bottom: none; }
  .event-time {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: #c8a96e;
    letter-spacing: 0.02em;
    margin-bottom: 6px;
  }
  .event-name {
    font-size: 15px;
    font-weight: 400;
    color: #fff;
    margin-bottom: 6px;
  }
  .event-meta {
    font-size: 12px;
    color: #666;
    line-height: 1.9;
  }
  .event-meta a {
    color: #6b9fd4;
    text-decoration: none;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
  }
  .event-meta a:hover { color: #88b8e8; text-decoration: underline; }
  .issue {
    display: inline-block;
    background: #251e14;
    border-left: 3px solid #c8a96e;
    color: #d4b87a;
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 0 4px 4px 0;
    margin: 2px 0;
  }
  .tag {
    display: inline-block;
    background: #1f1f1f;
    border: 1px solid #2c2c2c;
    border-radius: 4px;
    padding: 2px 7px;
    font-size: 11px;
    color: #888;
    margin-right: 4px;
    font-family: 'DM Mono', monospace;
  }
  .meeting-badge {
    display: inline-block;
    background: #0e1a2e;
    border: 1px solid #1e3a5f;
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 11px;
    color: #4a90d9;
    font-family: 'DM Mono', monospace;
  }
  .notes-section {
    margin-top: 12px;
    border-top: 1px dashed #222;
    padding-top: 12px;
  }
  .notes-toggle {
    background: none;
    border: none;
    cursor: pointer;
    color: #555;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0;
    transition: color 0.15s;
  }
  .notes-toggle:hover { color: #888; }
  .notes-toggle.has-notes { color: #6bbf6b; }
  .notes-toggle .arrow {
    display: inline-block;
    transition: transform 0.2s;
    font-style: normal;
  }
  .notes-toggle.open .arrow { transform: rotate(90deg); }
  .notes-body { display: none; margin-top: 10px; }
  .notes-body.open { display: block; }
  .notes-textarea {
    width: 100%;
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    color: #c8c4bc;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 10px 12px;
    resize: vertical;
    min-height: 80px;
    line-height: 1.6;
    outline: none;
    transition: border-color 0.15s;
  }
  .notes-textarea:focus { border-color: #3a3a3a; }
  .notes-textarea::placeholder { color: #333; }
  .notes-actions {
    display: flex;
    gap: 8px;
    margin-top: 8px;
    align-items: center;
  }
  .btn-save {
    background: #1a2e1a;
    border: 1px solid #2d4d2d;
    color: #6bbf6b;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 5px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-save:hover { background: #213d21; }
  .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-clear {
    background: none;
    border: none;
    color: #444;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    padding: 5px 8px;
    transition: color 0.15s;
  }
  .btn-clear:hover { color: #888; }
  .save-status {
    font-size: 11px;
    color: #555;
    margin-left: auto;
    font-family: 'DM Mono', monospace;
  }
  .save-status.saved { color: #6bbf6b; }
  .save-status.error { color: #e07b7b; }
  .save-status.saving { color: #c8a96e; }
  .notes-preview {
    font-size: 12px;
    color: #5a7a5a;
    line-height: 1.6;
    white-space: pre-wrap;
    font-family: 'DM Sans', sans-serif;
    margin-top: 8px;
    padding: 8px 10px;
    background: #0e1a0e;
    border-radius: 6px;
    border-left: 2px solid #2d4d2d;
  }
  .bottom-btns {
    margin-top: 24px;
    display: flex;
    gap: 10px;
    max-width: 540px;
    width: 100%;
  }
  .copy-btn {
    flex: 1;
    padding: 13px;
    background: #1e1e1e;
    border: 1px solid #2e2e2e;
    border-radius: 10px;
    color: #e8e4dc;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .copy-btn:hover { background: #252525; border-color: #3a3a3a; color: #fff; }
  .copy-btn.copied { background: #1a2e1a; border-color: #2d4d2d; color: #6bbf6b; }

  /* Auth & loading states */
  #auth-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 32px 0;
  }
  #auth-section p {
    color: #555;
    font-size: 13px;
    text-align: center;
  }
  .sign-in-btn {
    background: #1a2a1a;
    border: 1px solid #2d4d2d;
    color: #6bbf6b;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 12px 28px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sign-in-btn:hover { background: #213d21; }
  #loading {
    color: #555;
    font-size: 13px;
    text-align: center;
    padding: 32px 0;
    font-family: 'DM Mono', monospace;
  }
  #events-container { width: 100%; }
  #no-events {
    color: #555;
    font-size: 13px;
    text-align: center;
    padding: 24px 0;
  }
  .sign-out-btn {
    background: none;
    border: none;
    color: #444;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    padding: 0;
    margin-left: auto;
    transition: color 0.15s;
  }
  .sign-out-btn:hover { color: #888; }
</style>
</head>
<body>

<div class="card" id="main-card">
  <div class="header">
    <span class="header-icon">📅</span>
    <span class="header-title">Today's Schedule</span>
    <span class="header-date" id="today-date"></span>
    <button class="sign-out-btn" id="sign-out-btn" style="display:none" onclick="signOut()">Sign out</button>
  </div>

  <div id="auth-section">
    <p>Sign in with Google to load today's support calls</p>
    <button class="sign-in-btn" onclick="signIn()">🔐 Sign in with Google</button>
  </div>

  <div id="loading" style="display:none">Loading today's calls…</div>
  <div id="events-container" style="display:none"></div>
  <div id="no-events" style="display:none">No support calls found for today.</div>
</div>

<div class="bottom-btns" id="bottom-btns" style="display:none">
  <button class="copy-btn" id="copy-btn" onclick="copySchedule(this)">
    <span>📋</span> Copy Schedule
  </button>
</div>

<script>
  const CLIENT_ID = '1046847497846-hgdkmgpd53pbq5uiv9vhbigv133hj8ha.apps.googleusercontent.com';
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxzhbXWQeFvJlQvg0iIoUkpMiUy-neFQwPQ1tKuv3DdWw5bjUUlW-Rg3V17d60mxX4-vg/exec';
  const SCOPES = 'https://www.googleapis.com/auth/calendar.readonly';

  // Team meeting keywords to filter out
  const TEAM_MEETING_KEYWORDS = [
    'customer support / update meeting',
    'customer support weekly check-in',
    'update meeting',
    'weekly check-in',
    'team meeting',
    'stand up',
    'standup',
    'sync'
  ];

  let tokenClient;
  let accessToken = null;
  let todayEvents = [];
  let localNotes = {};

  // Set today's date in header
  const today = new Date();
  const dateStr = today.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }).toUpperCase();
  document.getElementById('today-date').textContent = dateStr;

  // Init Google token client
  window.onload = () => {
    if (typeof google === "undefined") {
      document.getElementById("loading").style.display = "block";
      document.getElementById("loading").textContent = "Error: Google API failed to load. Please check your internet connection and try again.";
      return;
    }
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPES,
      callback: (resp) => {
        if (resp.error) { console.error(resp); return; }
        accessToken = resp.access_token;
        document.getElementById('sign-out-btn').style.display = 'block';
        fetchTodayEvents();
      }
    });

    // Auto sign-in if token cached
    const cached = sessionStorage.getItem('ryse_token');
    if (cached) {
      accessToken = cached;
      document.getElementById('auth-section').style.display = 'none';
      document.getElementById('sign-out-btn').style.display = 'block';
      fetchTodayEvents();
    }
  };

  function signIn() {
    tokenClient.requestAccessToken({ prompt: 'consent' });
    document.getElementById('auth-section').style.display = 'none';
    document.getElementById('loading').style.display = 'block';
  }

  function signOut() {
    google.accounts.oauth2.revoke(accessToken, () => {});
    accessToken = null;
    sessionStorage.removeItem('ryse_token');
    document.getElementById('auth-section').style.display = 'flex';
    document.getElementById('events-container').style.display = 'none';
    document.getElementById('bottom-btns').style.display = 'none';
    document.getElementById('sign-out-btn').style.display = 'none';
    document.getElementById('events-container').innerHTML = '';
    localNotes = {};
  }

  async function fetchTodayEvents() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('events-container').style.display = 'none';

    const start = new Date(today);
    start.setHours(0, 0, 0, 0);
    const end = new Date(today);
    end.setHours(23, 59, 59, 999);

    const url = `https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${start.toISOString()}&timeMax=${end.toISOString()}&singleEvents=true&orderBy=startTime`;

    try {
      const res = await fetch(url, {
        headers: { Authorization: `Bearer ${accessToken}` }
      });
      const data = await res.json();

      if (data.error) throw new Error(data.error.message);

      sessionStorage.setItem('ryse_token', accessToken);

      // Filter out team meetings
      todayEvents = (data.items || []).filter(e => {
        const title = (e.summary || '').toLowerCase();
        return !TEAM_MEETING_KEYWORDS.some(kw => title.includes(kw));
      });

      document.getElementById('loading').style.display = 'none';

      if (todayEvents.length === 0) {
        document.getElementById('no-events').style.display = 'block';
        return;
      }

      renderEvents(todayEvents);
      document.getElementById('events-container').style.display = 'block';
      document.getElementById('bottom-btns').style.display = 'flex';

    } catch(err) {
      document.getElementById('loading').textContent = 'Error loading events: ' + err.message;
    }
  }

  function formatTime(dateTimeStr) {
    if (!dateTimeStr) return '';
    const d = new Date(dateTimeStr);
    return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }) + ' EDT';
  }

  function getIssueFromDescription(desc) {
    if (!desc) return '';
    const match = desc.match(/brief description[^:]*:\s*([^\n]+)/i) ||
                  desc.match(/issue[^:]*:\s*([^\n]+)/i) ||
                  desc.match(/problem[^:]*:\s*([^\n]+)/i);
    return match ? match[1].trim() : '';
  }

  function getOrderFromDescription(desc) {
    if (!desc) return '';
    const match = desc.match(/order number[^:]*:\s*([^\n]+)/i);
    return match ? match[1].trim() : '';
  }

  function getMeetLink(event) {
    if (event.hangoutLink) return event.hangoutLink;
    const desc = event.description || '';
    const match = desc.match(/https:\/\/meet\.google\.com\/[a-z-]+/);
    return match ? match[0] : null;
  }

  function getPhone(event) {
    const loc = event.location || '';
    const desc = event.description || '';
    const combined = loc + ' ' + desc;
    const match = combined.match(/\+?1?[\s.-]?\(?\d{3}\)?[\s.-]?\d{3}[\s.-]?\d{4}/);
    return match ? match[0].trim() : null;
  }

  function renderEvents(events) {
    const container = document.getElementById('events-container');
    container.innerHTML = '';

    events.forEach((event, idx) => {
      const id = 'event_' + idx;
      const startTime = formatTime(event.start?.dateTime || event.start?.date);
      const endTime = formatTime(event.end?.dateTime || event.end?.date);
      const timeRange = startTime && endTime ? `${startTime.replace(' EDT','')} – ${endTime}` : startTime;
      const title = event.summary || 'Untitled Event';
      const issue = getIssueFromDescription(event.description);
      const order = getOrderFromDescription(event.description);
      const meetLink = getMeetLink(event);
      const phone = getPhone(event);

      const div = document.createElement('div');
      div.className = 'event';
      div.innerHTML = `
        <div class="event-time">⏰ ${timeRange}</div>
        <div class="event-name">${title}</div>
        <div class="event-meta">
          RYSE Care Support Call
          ${order ? `<br><span class="tag">${order}</span>` : ''}
          ${issue ? `<br><span class="issue">⚠ ${issue}</span>` : ''}
          ${meetLink ? `<br>🔗 <a href="${meetLink}" target="_blank">${meetLink.replace('https://','')}</a>` : ''}
          ${phone ? `<br>📞 <a href="tel:${phone.replace(/\D/g,'')}">${phone}</a>` : ''}
        </div>
        <div class="notes-section">
          <button class="notes-toggle" onclick="toggleNotes('${id}')">
            <i class="arrow">›</i> <span class="label-text">Call Notes</span>
          </button>
          <div class="notes-body" id="notes-body-${id}">
            <textarea class="notes-textarea" id="notes-input-${id}" placeholder="Enter call notes, resolution, follow-ups…"></textarea>
            <div class="notes-actions">
              <button class="btn-save" id="btn-save-${id}" onclick="saveNotes('${id}', '${title.replace(/'/g,"\\'")}', '${timeRange.replace(/'/g,"\\'")}', '${issue.replace(/'/g,"\\'")}')">Save to Sheets</button>
              <button class="btn-clear" onclick="clearNotes('${id}')">Clear</button>
              <span class="save-status" id="status-${id}"></span>
            </div>
          </div>
          <div class="notes-preview" id="notes-preview-${id}" style="display:none"></div>
        </div>
      `;
      container.appendChild(div);
    });
  }

  function toggleNotes(id) {
    const body = document.getElementById('notes-body-' + id);
    const btn = body.previousElementSibling;
    const isOpen = body.classList.contains('open');
    if (isOpen) {
      body.classList.remove('open');
      btn.classList.remove('open');
    } else {
      body.classList.add('open');
      btn.classList.add('open');
      document.getElementById('notes-input-' + id).focus();
    }
  }

  async function saveNotes(id, eventName, eventTime, issueDesc) {
    const val = document.getElementById('notes-input-' + id).value.trim();
    if (!val) return;

    const status = document.getElementById('status-' + id);
    const saveBtn = document.getElementById('btn-save-' + id);
    const preview = document.getElementById('notes-preview-' + id);
    const toggle = document.getElementById('notes-body-' + id).previousElementSibling;

    status.textContent = 'Saving…';
    status.className = 'save-status saving';
    saveBtn.disabled = true;

    const dateLabel = today.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

    try {
      await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          date: dateLabel,
          time: eventTime,
          event: eventName,
          issue: issueDesc,
          notes: val
        })
      });

      localNotes[id] = val;
      preview.textContent = val;
      preview.style.display = 'block';
      toggle.classList.add('has-notes');
      toggle.querySelector('.label-text').textContent = 'Call Notes ✓';
      status.textContent = 'Saved to Sheets ✓';
      status.className = 'save-status saved';

      const body = document.getElementById('notes-body-' + id);
      body.classList.remove('open');
      toggle.classList.remove('open');

      setTimeout(() => { status.textContent = ''; status.className = 'save-status'; }, 3000);
    } catch(e) {
      status.textContent = 'Error saving';
      status.className = 'save-status error';
      setTimeout(() => { status.textContent = ''; status.className = 'save-status'; }, 3000);
    }
    saveBtn.disabled = false;
  }

  function clearNotes(id) {
    document.getElementById('notes-input-' + id).value = '';
    const preview = document.getElementById('notes-preview-' + id);
    preview.style.display = 'none';
    const btn = document.getElementById('notes-body-' + id).previousElementSibling;
    btn.classList.remove('has-notes');
    btn.querySelector('.label-text').textContent = 'Call Notes';
    localNotes[id] = '';
    document.getElementById('status-' + id).textContent = '';
  }

  function copySchedule(btn) {
    let text = `📅 TODAY'S SCHEDULE — ${dateStr}\n`;

    todayEvents.forEach(event => {
      const startTime = formatTime(event.start?.dateTime);
      const endTime = formatTime(event.end?.dateTime);
      const timeRange = `${startTime.replace(' EDT','')} – ${endTime}`;
      const title = event.summary || '';
      const issue = getIssueFromDescription(event.description);
      const order = getOrderFromDescription(event.description);
      const meetLink = getMeetLink(event);
      const phone = getPhone(event);
      const idx = todayEvents.indexOf(event);
      const id = 'event_' + idx;
      const notes = (localNotes[id] || '').trim();

      text += `\n──────────────────────────\n\n`;
      text += `⏰ ${timeRange}\n${title}\nRYSE Care Support Call`;
      if (order) text += ` | ${order}`;
      if (issue) text += `\n⚠ Issue: ${issue}`;
      if (meetLink) text += `\n🔗 ${meetLink}`;
      if (phone) text += `\n📞 ${phone}`;
      if (notes) text += `\nCall Notes:\n${notes}`;
      text += '\n';
    });

    navigator.clipboard.writeText(text).then(() => {
      btn.classList.add('copied');
      btn.innerHTML = '<span>✓</span> Copied!';
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = '<span>📋</span> Copy Schedule';
      }, 2000);
    });
  }
</script>
</body>
</html>
